            '|__/  |__/ \\\\______/ |_______/  \\\\____  $$       \\\\______/  \\\\_______/ \\\\_______/    \\\\_/    \\\\_______/ \\\\_______/|__/      \\\\_______/\n' +

            '                               \\\\______/\n',
            'color: #3f3f46; font-family: monospace;'
        );
        document.getElementById('footer-year').textContent = new Date().getFullYear();
        document.getElementById('copy-btn').addEventListener('click', function () {
            const btn = this;
            const icon = btn.querySelector('i');
            const label = document.getElementById('footer-email');
            if (!icon || !label) return;

            navigator.clipboard.writeText('hello@robysaavedra.com').then(() => {
                const DURATION = 240;
                function swapText(newText) {
                    label.classList.add('copy-state-exit');
                    setTimeout(() => {
                        label.textContent = newText;
                        label.classList.remove('copy-state-exit');
                        label.classList.add('copy-state-enter');
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => label.classList.remove('copy-state-enter'));
                        });
                    }, DURATION);
                }

                icon.className = 'ph ph-check copy-icon-success';
                setTimeout(() => icon.classList.remove('copy-icon-success'), 400);
                swapText('Email copied to clipboard');

                setTimeout(() => {
                    swapText('hello@robysaavedra.com');
                    icon.className = 'ph ph-copy';
                }, 1400);
            }).catch(() => {
                icon.className = 'ph ph-warning';
            });
        });
    </script>
